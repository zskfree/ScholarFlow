<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" height="auto">
  <title>ScholarFlow Architecture Diagram</title>
  <defs>
    <linearGradient id="arch-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0B0F19" />
    </linearGradient>

    <linearGradient id="node-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <linearGradient id="stroke-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="16" fill="url(#arch-bg)" stroke="#1E293B" stroke-width="2" />

  <!-- Title -->
  <text x="50" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">⚡ ScholarFlow 智能处理流与系统架构</text>
  <text x="50" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#94A3B8">从原始学术 PDF 到结构化文献综述的全自动化闭环流程</text>
  
  <line x1="50" y1="90" x2="1150" y2="90" stroke="url(#stroke-glow)" stroke-width="2" opacity="0.6" />

  <!-- ================= STAGE 1 ================= -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="url(#node-1)" stroke="#3B82F6" stroke-width="1.5" />
    <circle cx="30" cy="30" r="16" fill="#1E3A8A" />
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#60A5FA">1</text>
    <text x="56" y="34" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">解析与 OCR</text>

    <!-- Content Bullet points -->
    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="17" font-family="sans-serif" font-size="11" fill="#93C5FD">📄 文本 PDF 深度提取</text>

      <rect x="0" y="34" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="51" font-family="sans-serif" font-size="11" fill="#93C5FD">📷 MarkItDown 视觉 OCR</text>

      <rect x="0" y="68" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="85" font-family="sans-serif" font-size="11" fill="#93C5FD">📂 目录递归批量扫描</text>

      <rect x="0" y="102" width="200" height="20" rx="4" fill="#1E1B4B" />
      <text x="10" y="115" font-family="monospace" font-size="10" fill="#A5B4FC">Output: Structured Text</text>
    </g>
  </g>

  <!-- Flow Connector 1 -> 2 -->
  <path d="M 290 220 L 330 220" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 3" />
  <polygon points="330,215 340,220 330,225" fill="#3B82F6" />

  <!-- ================= STAGE 2 ================= -->
  <g transform="translate(340, 120)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="url(#node-1)" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="30" cy="30" r="16" fill="#311B92" />
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#C7D2FE">2</text>
    <text x="56" y="34" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">LLM 智能提取</text>

    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="17" font-family="sans-serif" font-size="11" fill="#C7D2FE">⚡ 多线程并发 (max_workers)</text>

      <rect x="0" y="34" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="51" font-family="sans-serif" font-size="11" fill="#C7D2FE">🎯 研究问题/方法/结论抽取</text>

      <rect x="0" y="68" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="85" font-family="sans-serif" font-size="11" fill="#C7D2FE">🤖 多模型适配 (Gemini/智谱)</text>

      <rect x="0" y="102" width="200" height="20" rx="4" fill="#1E1B4B" />
      <text x="10" y="115" font-family="monospace" font-size="10" fill="#A5B4FC">Output: JSON Summaries</text>
    </g>
  </g>

  <!-- Flow Connector 2 -> 3 -->
  <path d="M 580 220 L 620 220" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 3" />
  <polygon points="620,215 630,220 620,225" fill="#8B5CF6" />

  <!-- ================= STAGE 3 ================= -->
  <g transform="translate(630, 120)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="url(#node-1)" stroke="#EC4899" stroke-width="1.5" />
    <circle cx="30" cy="30" r="16" fill="#831843" />
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#FBCFE8">3</text>
    <text x="56" y="34" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">引用精准匹配</text>

    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="17" font-family="sans-serif" font-size="11" fill="#FBCFE8">🔗 自动化文献-引用关联</text>

      <rect x="0" y="34" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="51" font-family="sans-serif" font-size="11" fill="#FBCFE8">🔄 断点续传 (跳过已处理)</text>

      <rect x="0" y="68" width="200" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="85" font-family="sans-serif" font-size="11" fill="#FBCFE8">🛡️ 异常自动重试与兜底</text>

      <rect x="0" y="102" width="200" height="20" rx="4" fill="#1E1B4B" />
      <text x="10" y="115" font-family="monospace" font-size="10" fill="#A5B4FC">Output: Reference Mapping</text>
    </g>
  </g>

  <!-- Flow Connector 3 -> 4 -->
  <path d="M 870 220 L 910 220" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3" />
  <polygon points="910,215 920,220 910,225" fill="#10B981" />

  <!-- ================= STAGE 4 ================= -->
  <g transform="translate(920, 120)">
    <rect x="0" y="0" width="230" height="200" rx="12" fill="url(#node-1)" stroke="#10B981" stroke-width="1.5" />
    <circle cx="30" cy="30" r="16" fill="#064E3B" />
    <text x="30" y="35" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#A7F3D0">4</text>
    <text x="56" y="34" font-family="sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">导出与展示</text>

    <g transform="translate(20, 65)">
      <rect x="0" y="0" width="190" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="17" font-family="sans-serif" font-size="11" fill="#A7F3D0">📊 Excel 可读 CSV 综述</text>

      <rect x="0" y="34" width="190" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="51" font-family="sans-serif" font-size="11" fill="#A7F3D0">🌐 Flask SSE 实时进度推送</text>

      <rect x="0" y="68" width="190" height="26" rx="6" fill="#0F172A" />
      <text x="10" y="85" font-family="sans-serif" font-size="11" fill="#A7F3D0">📥 可视化界面一键下载</text>

      <rect x="0" y="102" width="190" height="20" rx="4" fill="#064E3B" />
      <text x="10" y="115" font-family="monospace" font-size="10" fill="#6EE7B7">Output: Final Deliverables</text>
    </g>
  </g>

</svg>
